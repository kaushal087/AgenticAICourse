<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative neural-network grid (background) -->
  <g opacity="0.08" stroke="white" stroke-width="1">
    <line x1="900" y1="60"  x2="1050" y2="180"/>
    <line x1="1050" y1="180" x2="920" y2="310"/>
    <line x1="920" y1="310" x2="1100" y2="400"/>
    <line x1="1100" y1="400" x2="960" y2="500"/>
    <line x1="900" y1="60"  x2="1100" y2="400"/>
    <line x1="1050" y1="180" x2="960" y2="500"/>
  </g>

  <!-- Decorative large nodes (background) -->
  <circle cx="900"  cy="60"  r="8"  fill="#818cf8" opacity="0.35"/>
  <circle cx="1050" cy="180" r="6"  fill="#a5b4fc" opacity="0.3"/>
  <circle cx="920"  cy="310" r="10" fill="#6366f1" opacity="0.35"/>
  <circle cx="1100" cy="400" r="7"  fill="#818cf8" opacity="0.3"/>
  <circle cx="960"  cy="500" r="9"  fill="#a5b4fc" opacity="0.25"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Logo icon (top-left) -->
  <g transform="translate(60, 55)">
    <rect width="52" height="52" rx="11" fill="#4f46e5"/>
    <line x1="26" y1="13"  x2="13"  y2="30"  stroke="white" stroke-width="2.2" stroke-opacity="0.6"/>
    <line x1="26" y1="13"  x2="39"  y2="30"  stroke="white" stroke-width="2.2" stroke-opacity="0.6"/>
    <line x1="13" y1="30"  x2="20"  y2="43"  stroke="white" stroke-width="2.2" stroke-opacity="0.5"/>
    <line x1="39" y1="30"  x2="32"  y2="43"  stroke="white" stroke-width="2.2" stroke-opacity="0.5"/>
    <line x1="13" y1="30"  x2="39"  y2="30"  stroke="white" stroke-width="2.2" stroke-opacity="0.3"/>
    <circle cx="26" cy="13" r="4.5" fill="white"/>
    <circle cx="13" cy="30" r="3.5" fill="#a5b4fc"/>
    <circle cx="39" cy="30" r="3.5" fill="#a5b4fc"/>
    <circle cx="20" cy="43" r="3"   fill="#c7d2fe"/>
    <circle cx="32" cy="43" r="3"   fill="#c7d2fe"/>
  </g>

  <!-- Course label -->
  <text x="128" y="89" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#a5b4fc" letter-spacing="2">AGENTIC AI COURSE</text>

  <!-- Main headline -->
  <text x="60" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="78" font-weight="800" fill="white" letter-spacing="-1">Agentic AI</text>
  <text x="60" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="78" font-weight="800" fill="#818cf8" letter-spacing="-1">Multi-Agent Systems</text>

  <!-- Subtitle pill tags — text-anchor=middle keeps text centred in each pill -->
  <g font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#c7d2fe" text-anchor="middle">
    <!-- LangChain: x=60, w=132 → center=126 -->
    <rect x="60"  y="340" width="132" height="36" rx="18" fill="#4f46e5" opacity="0.6"/>
    <text x="126" y="363">LangChain</text>

    <!-- LangGraph: x=204, w=132 → center=270 -->
    <rect x="204" y="340" width="132" height="36" rx="18" fill="#4f46e5" opacity="0.6"/>
    <text x="270" y="363">LangGraph</text>

    <!-- RAG: x=348, w=80 → center=388 -->
    <rect x="348" y="340" width="80"  height="36" rx="18" fill="#4f46e5" opacity="0.6"/>
    <text x="388" y="363">RAG</text>

    <!-- MCP: x=440, w=80 → center=480 -->
    <rect x="440" y="340" width="80"  height="36" rx="18" fill="#4f46e5" opacity="0.6"/>
    <text x="480" y="363">MCP</text>

    <!-- A2A: x=532, w=76 → center=570 -->
    <rect x="532" y="340" width="76"  height="36" rx="18" fill="#4f46e5" opacity="0.6"/>
    <text x="570" y="363">A2A</text>

    <!-- Evaluation: x=620, w=138 → center=689 -->
    <rect x="620" y="340" width="138" height="36" rx="18" fill="#4f46e5" opacity="0.6"/>
    <text x="689" y="363">Evaluation</text>
  </g>

  <!-- Description line -->
  <text x="60" y="432" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#e0e7ff" opacity="0.8">Production-grade AI engineering for senior software engineers</text>

  <!-- Bottom divider bar -->
  <rect x="0" y="554" width="1200" height="76" fill="#4f46e5" opacity="0.25"/>
  <rect x="0" y="554" width="1200" height="2"  fill="#6366f1" opacity="0.5"/>

  <!-- Bottom text -->
  <text x="60" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="white" opacity="0.65">LangChain · LangGraph · OpenAI · Whisper · FAISS · LangSmith · FastAPI · Pydantic</text>

  <!-- Tech stack icons (circles) right side bottom -->
  <circle cx="1050" cy="592" r="18" fill="#4f46e5" opacity="0.7"/>
  <text x="1040" y="598" font-family="sans-serif" font-size="18" fill="white">🤖</text>
  <circle cx="1100" cy="592" r="18" fill="#4f46e5" opacity="0.7"/>
  <text x="1090" y="598" font-family="sans-serif" font-size="18" fill="white">🦜</text>
  <circle cx="1150" cy="592" r="18" fill="#4f46e5" opacity="0.7"/>
  <text x="1139" y="598" font-family="sans-serif" font-size="18" fill="white">🔗</text>
</svg>
